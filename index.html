<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkVault</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Segoe UI",sans-serif}

:root{
    --bg:#0b1020;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.13);
    --text:#fff;
    --muted:rgba(255,255,255,.65);
    --primary:#0078ff;
    --danger:#ef4444;
    --fav:#facc15;
}

body{
    min-height:100vh;
    background:
    radial-gradient(circle at top left,#0078ff55,transparent 35%),
    radial-gradient(circle at bottom right,#7c3aed55,transparent 35%),
    var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.app{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    display:flex;
    align-items:center;
    gap:12px;
}

.logo-icon{
    width:54px;
    height:54px;
    border-radius:18px;
    background:linear-gradient(135deg,#0078ff,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
}

.logo h1{
    font-size:30px;
}

.logo span{
    color:var(--muted);
    font-size:14px;
}

.stats{
    display:flex;
    gap:15px;
}

.stat{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:14px 20px;
    text-align:center;
}

.stat strong{
    font-size:22px;
}

.stat p{
    color:var(--muted);
    font-size:13px;
}

.hero{
    padding:35px;
    border-radius:30px;
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(25px);
    margin-bottom:25px;
}

.hero h2{
    font-size:36px;
    margin-bottom:10px;
}

.hero p{
    color:var(--muted);
    line-height:1.6;
}

.grid{
    display:grid;
    grid-template-columns:360px 1fr;
    gap:25px;
}

.panel,
.link-card{
    background:var(--card);
    border:1px solid var(--border);
    backdrop-filter:blur(25px);
    border-radius:26px;
}

.panel{
    padding:25px;
    height:max-content;
    position:sticky;
    top:25px;
}

.panel h3{
    margin-bottom:18px;
}

.input,
.select{
    width:100%;
    padding:15px;
    border-radius:16px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.07);
    color:var(--text);
    outline:none;
    margin-bottom:14px;
}

.input::placeholder{
    color:var(--muted);
}

.select option{
    color:#111;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#0078ff,#2890ff);
    color:white;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.btn:hover{
    transform:translateY(-2px);
}

.btn-danger{
    background:linear-gradient(135deg,#ef4444,#f87171);
}

.tools{
    display:grid;
    grid-template-columns:1fr 180px;
    gap:15px;
    margin-bottom:20px;
}

.links{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:18px;
}

.link-card{
    padding:22px;
    transition:.25s;
}

.link-card:hover{
    transform:translateY(-5px);
}

.link-top{
    display:flex;
    justify-content:space-between;
    gap:15px;
    margin-bottom:12px;
}

.link-card h3{
    font-size:20px;
    word-break:break-word;
}

.url{
    color:#7ecbff;
    font-size:14px;
    word-break:break-all;
    margin-bottom:15px;
}

.category{
    display:inline-block;
    padding:7px 12px;
    border-radius:999px;
    background:rgba(0,120,255,.18);
    border:1px solid rgba(0,120,255,.35);
    font-size:13px;
    margin-bottom:12px;
}

.date{
    color:var(--muted);
    font-size:13px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:18px;
}

.actions button{
    flex:1;
    padding:11px;
    border:none;
    border-radius:13px;
    cursor:pointer;
    color:white;
    font-weight:600;
    background:#2563eb;
}

.actions .delete{
    background:var(--danger);
}

.favorite{
    cursor:pointer;
    font-size:22px;
    color:var(--fav);
}

.empty{
    padding:35px;
    border-radius:26px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--muted);
    text-align:center;
}

@media(max-width:850px){
    .grid{
        grid-template-columns:1fr;
    }

    .panel{
        position:relative;
        top:0;
    }

    .header{
        flex-direction:column;
        align-items:flex-start;
        gap:20px;
    }

    .stats{
        width:100%;
    }

    .stat{
        flex:1;
    }

    .tools{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="app">

    <header class="header">
        <div class="logo">
            <div class="logo-icon">🔗</div>
            <div>
                <h1>LinkVault</h1>
                <span>Seu cofre pessoal de links</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <strong id="totalLinks">0</strong>
                <p>Links</p>
            </div>

            <div class="stat">
                <strong id="totalFavs">0</strong>
                <p>Favoritos</p>
            </div>
        </div>
    </header>

    <section class="hero">
        <h2>Armazene seus links importantes</h2>
        <p>Salve sites, vídeos, projetos, ferramentas, estudos e qualquer link que você não quer perder.</p>
    </section>

    <section class="grid">

        <aside class="panel">
            <h3 id="formTitle">Adicionar link</h3>

            <input id="name" class="input" placeholder="Nome do link">
            <input id="url" class="input" placeholder="URL do link">
            <input id="category" class="input" placeholder="Categoria. Ex: Estudos, Jogos, Trabalho">

            <button class="btn" onclick="saveLink()">Salvar Link</button>

            <br><br>

            <button class="btn btn-danger" onclick="clearAll()">Apagar Todos</button>
        </aside>

        <main>

            <div class="tools">
                <input id="search" class="input" placeholder="Pesquisar links..." oninput="renderLinks()">

                <select id="filter" class="select" onchange="renderLinks()">
                    <option value="all">Todos</option>
                    <option value="favorites">Favoritos</option>
                </select>
            </div>

            <div id="linksList" class="links"></div>

        </main>

    </section>

</div>

<script>
let editIndex = null;

function getLinks(){
    return JSON.parse(localStorage.getItem("linkVault")) || [];
}

function setLinks(links){
    localStorage.setItem("linkVault", JSON.stringify(links));
}

function saveLink(){
    const name = document.getElementById("name").value.trim();
    let url = document.getElementById("url").value.trim();
    const category = document.getElementById("category").value.trim() || "Sem categoria";

    if(!name || !url){
        alert("Preencha o nome e a URL.");
        return;
    }

    if(!url.startsWith("http://") && !url.startsWith("https://")){
        url = "https://" + url;
    }

    const links = getLinks();

    const data = {
        name,
        url,
        category,
        favorite:false,
        createdAt:new Date().toLocaleString("pt-BR")
    };

    if(editIndex !== null){
        data.favorite = links[editIndex].favorite;
        data.createdAt = links[editIndex].createdAt;
        links[editIndex] = data;
        editIndex = null;
        document.getElementById("formTitle").innerText = "Adicionar link";
    }else{
        links.push(data);
    }

    setLinks(links);
    clearForm();
    renderLinks();
}

function renderLinks(){
    const list = document.getElementById("linksList");
    const search = document.getElementById("search").value.toLowerCase();
    const filter = document.getElementById("filter").value;

    let links = getLinks();

    if(filter === "favorites"){
        links = links.filter(link => link.favorite);
    }

    if(search){
        links = links.filter(link =>
            link.name.toLowerCase().includes(search) ||
            link.url.toLowerCase().includes(search) ||
            link.category.toLowerCase().includes(search)
        );
    }

    list.innerHTML = "";

    if(links.length === 0){
        list.innerHTML = `<div class="empty">Nenhum link encontrado.</div>`;
        updateStats();
        return;
    }

    links.forEach(link => {
        const realIndex = getLinks().findIndex(item =>
            item.name === link.name &&
            item.url === link.url &&
            item.createdAt === link.createdAt
        );

        list.innerHTML += `
            <div class="link-card">
                <div class="link-top">
                    <h3>${escapeHTML(link.name)}</h3>
                    <div class="favorite" onclick="toggleFavorite(${realIndex})">
                        ${link.favorite ? "★" : "☆"}
                    </div>
                </div>

                <div class="category">${escapeHTML(link.category)}</div>
                <div class="url">${escapeHTML(link.url)}</div>
                <div class="date">Salvo em: ${link.createdAt}</div>

                <div class="actions">
                    <button onclick="openLink('${encodeURIComponent(link.url)}')">Abrir</button>
                    <button onclick="editLink(${realIndex})">Editar</button>
                    <button class="delete" onclick="deleteLink(${realIndex})">Excluir</button>
                </div>
            </div>
        `;
    });

    updateStats();
}

function openLink(url){
    window.open(decodeURIComponent(url), "_blank");
}

function toggleFavorite(index){
    const links = getLinks();
    links[index].favorite = !links[index].favorite;
    setLinks(links);
    renderLinks();
}

function editLink(index){
    const links = getLinks();
    const link = links[index];

    document.getElementById("name").value = link.name;
    document.getElementById("url").value = link.url;
    document.getElementById("category").value = link.category;

    editIndex = index;
    document.getElementById("formTitle").innerText = "Editar link";
}

function deleteLink(index){
    if(!confirm("Deseja excluir este link?")) return;

    const links = getLinks();
    links.splice(index,1);
    setLinks(links);
    renderLinks();
}

function clearAll(){
    if(!confirm("Deseja apagar todos os links?")) return;

    localStorage.removeItem("linkVault");
    renderLinks();
}

function clearForm(){
    document.getElementById("name").value = "";
    document.getElementById("url").value = "";
    document.getElementById("category").value = "";
}

function updateStats(){
    const links = getLinks();
    const favs = links.filter(link => link.favorite).length;

    document.getElementById("totalLinks").innerText = links.length;
    document.getElementById("totalFavs").innerText = favs;
}

function escapeHTML(text){
    return text
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

renderLinks();
</script>

</body>
</html>
